name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./srs.slnx

      - name: Build
        run: dotnet build ./srs.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ./srs.Server.Tests/srs.Server.Tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
